# Deploy the seed-skills webhook behind Caddy (automatic HTTPS).
# Point skills.lightninglinq.ai at this host, open ports 80/443, then:
#   docker compose up -d --build
services:
  skills:
    build: .
    restart: unless-stopped
    environment:
      REQUIRE_PAYMENT_PROOF: "true"
    expose:
      - "8000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - skills

volumes:
  caddy_data:
  caddy_config:
